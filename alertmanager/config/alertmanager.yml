global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.faulds.au:587'
  smtp_from: 'brendan@faulds.au'
  smtp_auth_username: 'brendan@faulds.au'
  smtp_auth_password: 'Kaye1310!!'
  smtp_require_tls: true

route:
  group_by: ['alertname', 'instance']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'email'

receivers:
  - name: 'email'
    email_configs:
      - to: 'brendan@faulds.au'
        send_resolved: true
        headers:
          Subject: '[monitoring-pi] {{ .Status | toUpper }}: {{ .CommonLabels.alertname }}'

inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: ['alertname', 'instance']
