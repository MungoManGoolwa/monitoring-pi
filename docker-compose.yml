# Monitoring Stack - monitoring-pi
# ================================
# Port allocations:
#   3000  - Grafana
#   3001  - Forgejo (web)
#   2222  - Forgejo (SSH)
#   8428  - VictoriaMetrics
#   8880  - vmalert
#   3100  - Loki
#   9093  - Alertmanager
#   9115  - Blackbox Exporter
#   8080  - Healthchecks
#   8429  - vmagent
#   9080  - Promtail

services:

  victoria-metrics:
    image: victoriametrics/victoria-metrics:latest
    container_name: victoria-metrics
    ports:
      - "8428:8428"
    volumes:
      - vm-data:/storage
      - ./victoria-metrics/config:/etc/victoria-metrics
    command:
      - "--storageDataPath=/storage"
      - "--retentionPeriod=${VM_RETENTION_PERIOD:-12}"
    restart: unless-stopped

  vmalert:
    image: victoriametrics/vmalert:latest
    container_name: vmalert
    ports:
      - "8880:8880"
    volumes:
      - ./vmalert/config:/etc/vmalert
    command:
      - "--datasource.url=http://victoria-metrics:8428"
      - "--remoteRead.url=http://victoria-metrics:8428"
      - "--remoteWrite.url=http://victoria-metrics:8428"
      - "--notifier.url=http://alertmanager:9093"
      - "--rule=/etc/vmalert/*.yml"
    depends_on:
      - victoria-metrics
      - alertmanager
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=${GF_SERVER_ROOT_URL}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - victoria-metrics
      - loki
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
      - ./loki/config/loki.yml:/etc/loki/local-config.yaml
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - ./promtail/config/promtail.yml:/etc/promtail/config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command:
      - "-config.file=/etc/promtail/config.yml"
    depends_on:
      - loki
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/config/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    restart: unless-stopped

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: blackbox-exporter
    ports:
      - "9115:9115"
    volumes:
      - ./blackbox-exporter/config/blackbox.yml:/config/blackbox.yml
    command:
      - "--config.file=/config/blackbox.yml"
    restart: unless-stopped

  vmagent:
    image: victoriametrics/vmagent:latest
    container_name: vmagent
    ports:
      - "8429:8429"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./vmagent/config/vmagent.yml:/etc/vmagent/vmagent.yml
    command:
      - "--promscrape.config=/etc/vmagent/vmagent.yml"
      - "--remoteWrite.url=http://victoria-metrics:8428/api/v1/write"
    depends_on:
      - victoria-metrics
      - blackbox-exporter
    restart: unless-stopped

  forgejo:
    image: codeberg.org/forgejo/forgejo:11
    container_name: forgejo
    ports:
      - "${FORGEJO_HTTP_PORT:-3001}:3000"
      - "${FORGEJO_SSH_PORT:-2222}:22"
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - FORGEJO__server__DOMAIN=${FORGEJO_DOMAIN:-monitoring-pi}
      - FORGEJO__server__SSH_DOMAIN=${FORGEJO_DOMAIN:-monitoring-pi}
      - FORGEJO__server__SSH_PORT=${FORGEJO_SSH_PORT:-2222}
      - FORGEJO__server__ROOT_URL=http://${FORGEJO_DOMAIN:-monitoring-pi}:${FORGEJO_HTTP_PORT:-3001}/
    volumes:
      - forgejo-data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped

  webhook-receiver:
    build: ./webhook-receiver
    container_name: webhook-receiver
    ports:
      - "9999:9999"
    environment:
      - GRAFANA_URL=http://grafana:3000
      - GRAFANA_API_KEY=${GRAFANA_API_KEY}
      - WEBHOOK_PORT=9999
    depends_on:
      - grafana
    restart: unless-stopped

  gsc-collector:
    build: ./gsc-collector
    container_name: gsc-collector
    volumes:
      - ./gsc-collector/secrets:/app/secrets:ro
    environment:
      - GSC_CREDENTIALS=/app/secrets/gsc-credentials.json
      - GSC_SITE_URL=sc-domain:musick.com.au
      - VM_IMPORT_URL=http://victoria-metrics:8428/api/v1/import/prometheus
      - GSC_INTERVAL_SECONDS=21600
    depends_on:
      - victoria-metrics
    restart: unless-stopped

  visual-regression:
    build: ./playwright
    container_name: visual-regression
    volumes:
      - ./playwright/screenshots:/app/screenshots
    environment:
      - VM_IMPORT_URL=http://victoria-metrics:8428/api/v1/import/prometheus
    depends_on:
      - victoria-metrics
    restart: "no"
    profiles:
      - testing

  healthchecks:
    image: healthchecks/healthchecks:latest
    container_name: healthchecks
    ports:
      - "8080:8000"
    environment:
      - SECRET_KEY=${HC_SECRET_KEY}
      - SITE_ROOT=${HC_SITE_ROOT}
      - ALLOWED_HOSTS=*
      - DB_NAME=/data/hc.sqlite
      - SUPERUSER_EMAIL=brendan@faulds.au
      - SUPERUSER_PASSWORD=${HC_SUPERUSER_PASSWORD}
    volumes:
      - healthchecks-data:/data
    restart: unless-stopped

volumes:
  vm-data:
  grafana-data:
  loki-data:
  forgejo-data:
  healthchecks-data:
